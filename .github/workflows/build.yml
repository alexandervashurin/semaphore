---
# Полный пайплайн сборки, тестирования и артефактов
name: Build Pipeline
on: # yamllint disable-line rule:truthy
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5

      - name: Установка Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Кэш зависимостей Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: >-
            ${{ runner.os }}-check-${{
            hashFiles('rust/Cargo.lock') }}

      - name: Установка системных зависимостей
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config libsqlite3-dev

      - name: Проверка форматирования
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Компиляция (check)
        working-directory: rust
        run: cargo check --all-features

      - name: Clippy (запрет предупреждений)
        working-directory: rust
        run: cargo clippy --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5

      - name: Установка Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Кэш зависимостей Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: >-
            ${{ runner.os }}-test-${{
            hashFiles('rust/Cargo.lock') }}

      - name: Системные зависимости (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config libsqlite3-dev

      - name: Системные зависимости (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl pkg-config sqlite
        env:
          PKG_CONFIG_PATH: >-
            /opt/homebrew/opt/openssl@3/lib/pkgconfig:
            /usr/local/opt/openssl@3/lib/pkgconfig

      - name: Сборка релизной версии
        working-directory: rust
        run: cargo build --release

      - name: Запуск тестов
        working-directory: rust
        env:
          SEMAPHORE_DB_PATH: /tmp/test.db
          SEMAPHORE_JWT_SECRET: >-
            test-ci-secret-key-32-bytes-long!
        run: >-
          cargo test --release --features postgres --
          --test-threads=4
          --skip api_integration
          --skip kubernetes_integration

      - name: Upload Linux AMD64
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v5
        with:
          name: velum-linux-amd64
          path: rust/target/release/velum
          retention-days: 7

      - name: Upload Linux ARM64
        if: matrix.os == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v5
        with:
          name: velum-linux-arm64
          path: rust/target/release/velum
          retention-days: 7

      - name: Upload macOS ARM64
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v5
        with:
          name: velum-darwin-arm64
          path: rust/target/release/velum
          retention-days: 7

      - name: Upload macOS AMD64
        if: matrix.os == 'macos-13'
        uses: actions/upload-artifact@v5
        with:
          name: velum-darwin-amd64
          path: rust/target/release/velum
          retention-days: 7

  security:
    name: Security Audit
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5
      - name: Установка Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Установка cargo-audit
        run: cargo install cargo-audit --quiet
      - name: Запуск аудита
        working-directory: rust
        run: cargo audit

  coverage:
    name: Coverage
    needs: [test]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5
      - name: Установка Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Системные зависимости
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config libsqlite3-dev
      - name: Установка cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Запуск покрытия
        working-directory: rust
        env:
          SEMAPHORE_DB_PATH: /tmp/test.db
          SEMAPHORE_JWT_SECRET: >-
            test-ci-secret-key-32-bytes-long!
        run: |
          cargo tarpaulin \
            --workspace \
            --features postgres \
            --timeout 300 \
            --out Xml \
            --output-dir ../coverage \
            --exclude-files tests/*
      - name: Сохранение отчёта
        uses: actions/upload-artifact@v5
        with:
          name: rust-coverage-cobertura
          path: coverage/cobertura.xml
          retention-days: 7

  docker:
    name: Docker Build
    needs: [test]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/develop')
    permissions:
      packages: write
      contents: read
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5
      - name: Настройка QEMU
        uses: docker/setup-qemu-action@v3
      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Авторизация в GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Метаданные образа
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{
              github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{
              github.ref == 'refs/heads/develop' }}
      - name: Сборка и публикация
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: E2E Smoke Test
    needs: [docker]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: velum
          POSTGRES_USER: velum
          POSTGRES_PASSWORD: velum_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5

      - name: Установка Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Системные зависимости
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config libsqlite3-dev jq

      - name: Ожидание готовности БД
        run: |
          for i in $(seq 1 30); do
            if PGPASSWORD=velum_pass psql -h localhost -p 5432 \
              -U velum -d velum -c 'SELECT 1' >/dev/null 2>&1; then
              echo "✅ DB ready"
              exit 0
            fi
            sleep 2
          done
          echo "❌ DB timeout"
          exit 1

      - name: Сборка и запуск сервера
        env:
          VELUM_DB_URL: postgres://velum:velum_pass@localhost:5432/velum
          VELUM_DB_DIALECT: postgres
          VELUM_JWT_SECRET: e2e-test-secret-key-32-bytes-long!
          VELUM_WEB_PATH: ${{ github.workspace }}/web/public
          VELUM_ADMIN: admin
          VELUM_ADMIN_PASSWORD: admin123
        run: |
          cd rust && cargo build --release --bin velum

          # Запуск в фоне
          ./target/release/velum server --host 0.0.0.0 --port 3000 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"

          # Health-check
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/healthz >/dev/null 2>&1; then
              echo "✅ Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Server timeout"
          kill "$SERVER_PID" 2>/dev/null || true
          exit 1

      - name: Проверка health-эндпоинтов
        run: |
          curl -sf http://localhost:3000/healthz
          curl -sf http://localhost:3000/readyz
          echo "✅ Health endpoints OK"

      - name: API smoke-тесты
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:3000/api/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"admin123"}' | jq -r '.token')
          echo "✅ Auth OK"

          curl -sf http://localhost:3000/api/projects \
            -H "Authorization: Bearer $TOKEN" >/dev/null
          echo "✅ Projects API OK"

          curl -sf http://localhost:3000/api/templates \
            -H "Authorization: Bearer $TOKEN" >/dev/null
          echo "✅ Templates API OK"

          echo "🎉 All smoke tests passed ✅"

      - name: Очистка процессов
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true
      - name: Очистка процессов
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

  docs:
    name: Build Documentation
    needs: [check]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5
      - name: Установка Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Генерация документации
        working-directory: rust
        run: cargo doc --no-deps 2>&1 | tee /tmp/doc.log
      - name: Подготовка к загрузке
        run: |
          mkdir -p public
          cp -r rust/target/doc/* public/
          if [ ! -f public/index.html ]; then
            echo '<meta http-equiv="refresh" \
                  content="0; url=velum/index.html">' \
              > public/index.html
          fi
      - name: Сохранение артефакта
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: public/
          retention-days: 1

  deploy-docs:
    name: Deploy Docs
    needs: [docs]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Публикация
        id: deployment
        uses: actions/deploy-pages@v4

  collect-binaries:
    name: Collect Binaries
    needs: [test]
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5
      - name: Download Linux AMD64
        uses: actions/download-artifact@v5
        with:
          name: velum-linux-amd64
          path: release/linux-amd64
      - name: Download Linux ARM64
        uses: actions/download-artifact@v5
        with:
          name: velum-linux-arm64
          path: release/linux-arm64
      - name: Download Darwin AMD64
        uses: actions/download-artifact@v5
        with:
          name: velum-darwin-amd64
          path: release/darwin-amd64
      - name: Download Darwin ARM64
        uses: actions/download-artifact@v5
        with:
          name: velum-darwin-arm64
          path: release/darwin-arm64
      - name: Переименование бинарников
        run: |
          for dir in release/*/; do
            platform=$(basename "$dir")
            mv "$dir/velum" "$dir/velum-$platform"
          done
      - name: Архивация релиза
        uses: actions/upload-artifact@v5
        with:
          name: release-binaries
          path: release/
          retention-days: 30
