name: Community Beta
on:
  push:
    tags:
      - "v*-beta*"

permissions:
  contents: write

jobs:
  prerelease:
    name: Подготовка пререлиза
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5

      - name: Установка Go
        uses: actions/setup-go@v6
        with:
          go-version: "^1.23"

      - name: Установка Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Установка go-task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Установка rpm
        run: sudo apt update && sudo apt-get install -y rpm

      - name: Установка зависимостей
        run: task deps

      - name: Импорт GPG ключа
        run: |
          echo "${{ secrets.GPG_KEY }}" | tr " " "\n" | base64 -d | gpg --import --batch
          gpg --sign -u "${{ vars.GPG_KEY_ID }}" --pinentry-mode loopback --yes --batch --passphrase "${{ secrets.GPG_PASS }}" --output unlock.sig --detach-sign README.md
          rm -f unlock.sig

      - name: Сброс состояния репозитория
        run: git reset --hard

      - name: Запуск релиза
        run: |
          GITHUB_TOKEN=${{ github.token }} \
          PROJECT_NAME=semaphore_community \
          GPG_KEY_ID="${{ vars.GPG_KEY_ID }}" \
            task release:prod

  deploy-beta:
    name: Публикация Community-образов
    runs-on: ubuntu-latest
    if: github.repository_owner == 'semaphoreui'
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5

      - name: Настройка QEMU
        id: qemu
        uses: docker/setup-qemu-action@v3

      - name: Настройка Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Авторизация в Docker Hub
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Метаданные Server
        id: server
        uses: docker/metadata-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: |
            velum/velum-community
          labels: |
            org.opencontainers.image.vendor=SemaphoreUI
            maintainer=Velum <support@semaphoreui.com>
          tags: |
            type=raw,value=${{ github.ref_name }}
          flavor: |
            latest=false

      - name: Сборка Server
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: deployment/docker/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.server.outputs.labels }}
          tags: ${{ steps.server.outputs.tags }}

      - name: Метаданные Runner (отключено)
        if: false
        id: runner
        uses: docker/metadata-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: |
            semaphoreui/runner-community
          labels: |
            org.opencontainers.image.vendor=SemaphoreUI
            maintainer=Velum <support@semaphoreui.com>
          tags: |
            type=raw,value=${{ github.ref_name }}
          flavor: |
            latest=false

      - name: Сборка Runner (отключено)
        if: false
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: deployment/docker/runner/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.runner.outputs.labels }}
          tags: ${{ steps.runner.outputs.tags }}