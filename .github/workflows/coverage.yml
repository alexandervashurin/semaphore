name: Rust Coverage
on:
  push:
    branches: [main, develop]
    paths: ["rust/", ".github/workflows/coverage.yml"]
  pull_request:
    branches: [main, develop]
    paths: ["rust/", ".github/workflows/coverage.yml"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  tarpaulin:
    name: Tarpaulin Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5

      - name: Установка Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Установка системных зависимостей
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libssl-dev \
            pkg-config \
            libsqlite3-dev

      - name: Кэш Cargo registry и target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-coverage-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-

      - name: Установка cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Запуск tarpaulin
        working-directory: rust
        env:
          SEMAPHORE_DB_PATH: /tmp/test_semaphore.db
          SEMAPHORE_JWT_SECRET: test-ci-secret-key-32-bytes-long!
        run: |
          cargo tarpaulin \
            --workspace \
            --features postgres \
            --timeout 180 \
            --out Xml \
            --output-dir ../coverage \
            --exclude-files tests/*

      - name: Сохранение отчёта покрытия
        uses: actions/upload-artifact@v5
        with:
          name: rust-coverage-cobertura
          path: coverage/cobertura.xml
          retention-days: 7