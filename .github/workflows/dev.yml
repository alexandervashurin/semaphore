    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:12.22
        env:
          POSTGRES_USER: semaphore
          POSTGRES_PASSWORD: p455w0rd
          POSTGRES_DB: semaphore
        options: >-
