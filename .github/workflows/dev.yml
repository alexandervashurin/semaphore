        run: |
          task dredd:goodman
          task dredd:deps
          task dredd:hooks
          task dredd:test

  # 12. Деплой Server (develop)
  deploy-server:
    name: Деплой Server (Develop)
    needs:
      - integrate-boltdb
      - integrate-mysql
      - integrate-mariadb
      - integrate-postgres
    runs-on: ubuntu-latest
    if: github.repository_owner == 'semaphoreui'
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5
      - name: Настройка QEMU
        id: qemu
        uses: docker/setup-qemu-action@v3
      - name: Настройка Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
      - name: Авторизация в Docker Hub
        uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}
      - name: Метаданные Server
        id: server
        uses: docker/metadata-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: velum/velum-community
          labels: |
            org.opencontainers.image.vendor=SemaphoreUI
            maintainer=Velum <support@semaphoreui.com>
          tags: |
            type=raw,value=develop
          flavor: |
            latest=false
      - name: Сборка и публикация Server
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: deployment/docker/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.server.outputs.labels }}
          tags: ${{ steps.server.outputs.tags }}

