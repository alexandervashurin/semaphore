  # 7. Интеграционные тесты (BoltDB)
  integrate-boltdb:
    name: Интеграция BoltDB
    needs: [migrate-boltdb]
    runs-on: ubuntu-latest
    env:
      SEMAPHORE_DB_OPTIONS: '{"sessionConnection": "true"}'
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5
      - name: Установка Go
        uses: actions/setup-go@v6
        with: {go-version: '^1.23'}
      - name: Установка Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Установка go-task
        run: go install github.com/go-task/task/v3/cmd/task@latest
      - name: Загрузка артефакта
        uses: actions/download-artifact@v8
        with: {name: semaphore}
      - name: Подготовка stdin для setup
        run: |
          cat <<EOF > config.stdin
          2
          /tmp/database.bolt
          /tmp/semaphore
          http://localhost:3000
          no
          no
          no
          no
          no
          no
          $(pwd)/.dredd
          admin
          admin@localhost
          Developer
          password
          EOF
      - name: Инициализация
        run: |
          chmod +x ./semaphore && ./semaphore setup - < config.stdin
      - name: Запуск Dredd-тестов
        run: |
          task dredd:goodman
          task dredd:deps
          task dredd:hooks
          task dredd:test

  # 8. Интеграционные тесты (MySQL)
  integrate-mysql:
    name: Интеграция MySQL
    needs: [migrate-mysql]
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: p455w0rd
          MYSQL_USER: semaphore
          MYSQL_PASSWORD: p455w0rd
          MYSQL_DATABASE: semaphore
        options: >-
