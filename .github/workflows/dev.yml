      - name: Установка go-task
        run: go install github.com/go-task/task/v3/cmd/task@latest
      - name: Загрузка артефакта
        uses: actions/download-artifact@v8
        with: {name: semaphore}
      - name: Подготовка stdin для setup
        run: |
          cat <<EOF > config.stdin
          1
          localhost:3306
          semaphore
          p455w0rd
          semaphore
          /tmp/semaphore
          http://localhost:3000
          no
          no
          no
          no
          no
          no
          $(pwd)/.dredd
          admin
          admin@localhost
          Developer
          password
          EOF
      - name: Инициализация
        run: |
          chmod +x ./semaphore && ./semaphore setup - < config.stdin
      - name: Запуск Dredd-тестов
        run: |
          task dredd:goodman
          task dredd:deps
          task dredd:hooks
          task dredd:test

