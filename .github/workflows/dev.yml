        run: |
          cat <<EOF > config.json
          {
            "mysql": {
              "host": "localhost:3306",
              "user": "semaphore",
              "pass": "p455w0rd",
              "name": "semaphore"
            },
            "dialect": "mysql",
            "email_alert": false
