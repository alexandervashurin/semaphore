---
# .github/workflows/dev.yml
name: Dev Pipeline
on:  # yamllint disable-line rule:truthy
  push:
    branches: [develop, "2-*-stable"]
  pull_request:
    branches: [develop]

jobs:
  # 1. Локальная сборка и тесты
  build-local:
    name: Сборка и тесты (Local)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5

      - name: Установка Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.23'  # Стабильная ветка.
          # Замени на '^1.24', если используется nightly

      - name: Установка Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Установка go-task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Установка зависимостей
        run: task deps

      - name: Сборка проекта
        run: task build

      - name: Проверка неизменённых файлов
        run: |
          git diff --exit-code --stat -- . \
            ':(exclude)web/package.json' \
            ':(exclude)web/package-lock.json' \
            ':(exclude)go.mod' \
            ':(exclude)go.sum'

      - name: Запуск тестов
        run: task test

      - name: Сохранение бинарника
        uses: actions/upload-artifact@v5
        with:
          name: semaphore
          path: bin/semaphore
          retention-days: 1

  # 2. Миграции БД (BoltDB)
  migrate-boltdb:
    name: Миграция BoltDB
    needs: [build-local]
    runs-on: ubuntu-latest
    steps:
      - name: Загрузка артефакта
        uses: actions/download-artifact@v8
        with:
          name: semaphore

      - name: Создание конфигурации
        run: |
          cat <<EOF > config.json
          {
            "bolt": {
              "host": "/tmp/database.bolt"
            },
            "dialect": "bolt",
            "email_alert": false
          }
          EOF

      - name: Применение миграций
        run: |
          chmod +x ./semaphore && ./semaphore migrate --config config.json

  # 3. Миграции БД (MySQL)
  migrate-mysql:
    name: Миграция MySQL
    needs: [build-local]
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: p455w0rd
          MYSQL_USER: semaphore
          MYSQL_PASSWORD: p455w0rd
          MYSQL_DATABASE: semaphore
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
    steps:
      - name: Загрузка артефакта
        uses: actions/download-artifact@v8
        with:
          name: semaphore

      - name: Создание конфигурации
        run: |
          cat <<EOF > config.json
          {
            "mysql": {
              "host": "localhost:3306",
              "user": "semaphore",
              "pass": "p455w0rd",
              "name": "semaphore"
            },
            "dialect": "mysql",
            "email_alert": false
          }
          EOF

      - name: Применение миграций
        run: |
          chmod +x ./semaphore && ./semaphore migrate --config config.json

  # 4. Миграции БД (MariaDB)
  migrate-mariadb:
    name: Миграция MariaDB
    needs: [build-local]
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: p455w0rd
          MARIADB_USER: semaphore
          MARIADB_PASSWORD: p455w0rd
          MARIADB_DATABASE: semaphore
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
