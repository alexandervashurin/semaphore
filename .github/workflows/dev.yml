      - name: Установка Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Установка go-task
        run: go install github.com/go-task/task/v3/cmd/task@latest
      - name: Загрузка артефакта
        uses: actions/download-artifact@v8
        with: {name: semaphore}
      - name: Подготовка stdin для setup
        run: |
          cat <<EOF > config.stdin
          1
          localhost:3306
          semaphore
          p455w0rd
          semaphore
          /tmp/semaphore
          http://localhost:3000
          no
          no
          no
          no
          no
          no
          $(pwd)/.dredd
          admin
          admin@localhost
          Developer
          password
          EOF
      - name: Инициализация
        run: |
          chmod +x ./semaphore && ./semaphore setup - < config.stdin
      - name: Запуск Dredd-тестов
        run: |
          task dredd:goodman
          task dredd:deps
          task dredd:hooks
          task dredd:test

  # 9. Интеграционные тесты (MariaDB)
  integrate-mariadb:
    name: Интеграция MariaDB
    needs: [migrate-mariadb]
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: p455w0rd
          MARIADB_USER: semaphore
          MARIADB_PASSWORD: p455w0rd
          MARIADB_DATABASE: semaphore
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5
      - name: Установка Go
        uses: actions/setup-go@v6
