          EOF

      - name: Применение миграций
        run: |
          chmod +x ./semaphore && ./semaphore migrate --config config.json

  # 5. Миграции БД (PostgreSQL)
  migrate-postgres:
    name: Миграция PostgreSQL
    needs: [build-local]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:12.22
        env:
          POSTGRES_USER: semaphore
          POSTGRES_PASSWORD: p455w0rd
          POSTGRES_DB: semaphore
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Загрузка артефакта
        uses: actions/download-artifact@v8
        with:
          name: semaphore

      - name: Создание конфигурации
        run: |
          cat <<EOF > config.json
          {
            "postgres": {
              "host": "localhost:5432",
              "user": "semaphore",
              "pass": "p455w0rd",
              "name": "semaphore",
              "options": {
                "sslmode": "disable"
              }
            },
            "dialect": "postgres",
            "email_alert": false
          }
          EOF

      - name: Применение миграций
        run: |
          chmod +x ./semaphore && ./semaphore migrate --config config.json

  # 6. Миграции БД (SQLite)
  migrate-sqlite:
    name: Миграция SQLite
    needs: [build-local]
