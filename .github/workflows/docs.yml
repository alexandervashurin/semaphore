---
# Пайплайн для сборки и публикации документации на GitHub Pages
name: Publish Documentation

on: # yamllint disable-line rule:truthy
  push:
    branches: [main]
    paths:
      - 'rust/**'
      - 'docs/**'
      - 'wiki/**'
      - 'openapi.yml'
      - 'api-docs.yml'
  workflow_dispatch:

# Разрешения для работы с GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Отменяем устаревшие запуски при новых коммитах
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-docs:
    name: Сборка документации
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Установка mdBook
        run: |
          URL="https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz"
          curl -L "$URL" | tar xz
          sudo mv mdbook /usr/local/bin/
          mdbook --version

      - name: Кэш Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: >-
            ${{ runner.os }}-cargo-${{
            hashFiles('rust/Cargo.lock') }}

      - name: Установка системных зависимостей
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Генерация Rust документации
        run: |
          cd rust
          cargo doc --no-deps --document-private-items

      - name: Сборка mdBook
        run: |
          cd docs/book
          mdbook build

      - name: Объединение артефактов
        run: |
          mkdir -p public
          cp -r docs/book/book/* public/
          mkdir -p public/rustdoc
          cp -r rust/target/doc/* public/rustdoc/
          cp openapi.yml public/
          cp api-docs.yml public/
          cat > public/index.html << 'EOF'
          <meta http-equiv="refresh" content="0; url=velum/">
          EOF

      - name: Сохранение артефакта для GitHub Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Публикация на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
