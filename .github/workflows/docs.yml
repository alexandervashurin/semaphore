# .github/workflows/docs.yml
name: Publish Documentation

on:
  push:
    branches: [main]
    paths: ['rust/**', 'docs/**']
  workflow_dispatch:

# Разрешения для GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Отменяем старые запуски
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-docs:
    name: Сборка документации
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4  # ✅ Исправлено с @v6 на @v4

      - name: Установка Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Кэш Cargo registry
        uses: actions/cache@v4  # ✅ Исправлено с @v5 на @v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Установка системных зависимостей
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Генерация документации
        run: |
          cd rust
          cargo doc --no-deps --document-private-items

      - name: Добавление редиректа
        run: |
          mkdir -p rust/target/doc
          cat > rust/target/doc/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=velum_ffi/">
              <title>Redirect to Velum Documentation</title>
            </head>
            <body>
              <p>Redirecting to <a href="velum_ffi/">Velum documentation</a>...</p>
            </body>
          </html>
          EOF

      - name: Сохранение артефакта для GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: rust/target/doc

      - name: Публикация на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4