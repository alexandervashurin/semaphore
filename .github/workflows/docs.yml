name: Publish Documentation
on:
  push:
    branches: [main]
    paths: ["rust/**", "docs/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-docs:
    name: Сборка документации
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5

      - name: Установка Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Кэш Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Установка системных зависимостей
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Генерация документации
        run: |
          cd rust
          cargo doc --no-deps --document-private-items

      - name: Добавление редиректа
        run: |
          mkdir -p rust/target/doc
          cat > rust/target/doc/index.html << 'EOF'
          <html><body>Redirecting to <a href="velum_ffi/">Velum documentation</a>...</body></html>
          EOF

      - name: Сохранение артефакта для GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: rust/target/doc

      - name: Публикация на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-crates-io:
    name: Публикация на crates.io
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5

      - name: Установка Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Кэш Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Установка системных зависимостей
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Публикация пакета
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cd rust
          cargo publish --no-verify