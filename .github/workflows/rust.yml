name: Rust CI

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'
    paths:
      - 'rust/**'
      - '.github/workflows/rust.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'rust/**'
      - '.github/workflows/rust.yml'
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libssl-dev \
            pkg-config \
            libsqlite3-dev

      - name: Check formatting
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Build
        working-directory: rust
        run: cargo build --all-features 2>&1

      - name: Clippy (deny warnings)
        working-directory: rust
        run: cargo clippy --all-features -- -D warnings

      - name: Run tests
        working-directory: rust
        env:
          SEMAPHORE_DB_PATH: /tmp/test_semaphore.db
          SEMAPHORE_JWT_SECRET: test-ci-secret-key-32-bytes-long!
        run: cargo test --all-features -- --test-threads=4

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Run security audit
        working-directory: rust
        run: cargo audit
