name: Rust CI
on:
  push:
    branches: [main, develop, "feat/*", "fix/*"]
    paths: ["rust/", ".github/workflows/rust.yml"]
  pull_request:
    branches: [main, develop]
    paths: ["rust/", ".github/workflows/rust.yml"]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5

      - name: Установка Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Кэш Cargo registry и target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Установка системных зависимостей
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libssl-dev \
            pkg-config \
            libsqlite3-dev

      - name: Проверка форматирования
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Сборка проекта
        working-directory: rust
        run: cargo build --all-features

      - name: Clippy (строгий режим)
        working-directory: rust
        run: cargo clippy --all-features -- -D warnings

      - name: Запуск тестов
        working-directory: rust
        env:
          SEMAPHORE_DB_PATH: /tmp/test_semaphore.db
          SEMAPHORE_JWT_SECRET: test-ci-secret-key-32-bytes-long!
        run: cargo test --features postgres -- --test-threads=4 --skip api_integration --skip kubernetes_integration

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5

      - name: Установка Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Установка cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Запуск аудита безопасности
        working-directory: rust
        run: cargo audit