---
# Демонстрационный деплой-плейбук
- name: Deploy Web Application
  hosts: all
  gather_facts: yes
  vars:
    app_name: "demo-app"
    app_version: "{{ lookup('env', 'APP_VERSION') | default('1.0.0') }}"
  tasks:
    - name: Print deploy info
      ansible.builtin.debug:
        msg: "Deploying {{ app_name }} v{{ app_version }} to {{ inventory_hostname }}"

    - name: Create app directory
      ansible.builtin.file:
        path: "/tmp/{{ app_name }}"
        state: directory
        mode: '0755'

    - name: Write version file
      ansible.builtin.copy:
        content: "{{ app_version }}\n"
        dest: "/tmp/{{ app_name }}/version.txt"
        mode: '0644'

    - name: Simulate health check
      ansible.builtin.command: echo "OK"
      register: health
      changed_when: false

    - name: Deploy complete
      ansible.builtin.debug:
        msg: "Deployment of {{ app_name }} v{{ app_version }} completed successfully!"
