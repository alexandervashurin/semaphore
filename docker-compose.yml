version: '3.8'

# Docker Compose для полного стека Semaphore UI
# Использование: docker-compose up -d

services:
  # PostgreSQL с демо-данными
  db:
    image: postgres:15-alpine
    container_name: semaphore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: semaphore
      POSTGRES_USER: semaphore
      POSTGRES_PASSWORD: semaphore123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Инициализация БД демонстрационными данными
      - ./db/postgres/init-demo.sql:/docker-entrypoint-initdb.d/init-demo.sql:ro
    networks:
      - semaphore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semaphore -d semaphore"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend (Rust)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: semaphore-backend
    restart: unless-stopped
    environment:
      SEMAPHORE_DB_DIALECT: postgres
      SEMAPHORE_DB_HOST: db
      SEMAPHORE_DB_PORT: 5432
      SEMAPHORE_DB_NAME: semaphore
      SEMAPHORE_DB_USER: semaphore
      SEMAPHORE_DB_PASS: semaphore123
      SEMAPHORE_WEB_PATH: /app/web/public
      SEMAPHORE_ADMIN: admin
      SEMAPHORE_ADMIN_NAME: Administrator
      SEMAPHORE_ADMIN_EMAIL: admin@localhost
      SEMAPHORE_ADMIN_PASSWORD: admin123
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - semaphore-network
    volumes:
      - ./web/public:/app/web/public:ro
    command: >
      sh -c "
        echo '⏳ Ожидание готовности PostgreSQL...' &&
        sleep 5 &&
        echo '🚀 Запуск Semaphore UI...' &&
        /usr/local/bin/semaphore server --host 0.0.0.0 --port 3000
      "

  # Frontend build (собирает и обновляет файлы)
  frontend-build:
    image: node:18-alpine
    container_name: semaphore-frontend-build
    working_dir: /app
    volumes:
      - ./web:/app
    command: >
      sh -c "
        if [ ! -f /app/public/app.js ] || [ ! -s /app/public/app.js ]; then
          echo '📦 Frontend не собран. Установка зависимостей...' &&
          npm ci --only=production &&
          echo '🔨 Сборка frontend...' &&
          npm run build &&
          echo '✓ Frontend собран!'
        else
          echo '✓ Frontend уже собран'
        fi
      "
    networks:
      - semaphore-network

networks:
  semaphore-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
