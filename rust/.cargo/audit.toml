# cargo-audit configuration
# Ignore transitive unmaintained/unsound dependencies that are upstream issues
[advisories]
ignore = [
    "RUSTSEC-2023-0071",  # rsa via sqlx-postgres for SCRAM auth only
    "RUSTSEC-2025-0012",  # backoff 0.4.0 unmaintained — via kube-runtime
    "RUSTSEC-2024-0384",  # instant 0.1.13 unmaintained — via backoff → kube-runtime
    "RUSTSEC-2025-0134",  # rustls-pemfile 2.2.0 unmaintained — via kube-client
    "RUSTSEC-2026-0097",  # rand 0.8.5 unsound — transitive via sqlx/oauth2/kube/wasmtime
]
