<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Environments - Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2><i class="fa-solid fa-rocket"></i> Deployment Environments</h2>
                <button class="btn btn-primary" onclick="openModal()"><i class="fa-solid fa-plus"></i> Создать Environment</button>
            </div>

            <div class="main-body">
                <div class="card" style="margin-bottom:16px; padding:12px 16px; background:#e8f5e9; border-left:4px solid #4caf50;">
                    <strong>Deployment Environments</strong> — отслеживайте состояние ваших деплоев по окружениям (GitLab-style).
                    Каждое окружение показывает последний деплой, версию и статус.
                </div>

                <!-- Tier filter tabs -->
                <div class="tabs-bar" style="margin-bottom:16px;">
                    <button class="tab-btn active" onclick="filterByTier('all', this)">Все</button>
                    <button class="tab-btn" onclick="filterByTier('production', this)">Production</button>
                    <button class="tab-btn" onclick="filterByTier('staging', this)">Staging</button>
                    <button class="tab-btn" onclick="filterByTier('dev', this)">Dev</button>
                    <button class="tab-btn" onclick="filterByTier('review', this)">Review</button>
                    <button class="tab-btn" onclick="filterByTier('other', this)">Other</button>
                </div>

                <div id="environments-content">
                    <div class="loading"><div class="loading-spinner"></div><p>Загрузка...</p></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="env-modal" class="modal-overlay" style="display:none;">
        <div class="modal" style="max-width:560px;">
            <div class="modal-header">
                <h3 id="modal-title">Создать Deployment Environment</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="env-id">

                <div class="form-group">
                    <label for="env-name">Название *</label>
                    <input type="text" id="env-name" class="form-control" required placeholder="production">
                </div>

                <div class="form-group">
                    <label for="env-url">URL окружения</label>
                    <input type="url" id="env-url" class="form-control" placeholder="https://myapp.com">
                </div>

                <div class="form-group">
                    <label for="env-tier">Tier</label>
                    <select id="env-tier" class="form-control">
                        <option value="production">Production</option>
                        <option value="staging">Staging</option>
                        <option value="dev">Dev</option>
                        <option value="review">Review</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="env-template-id">Template (для запуска деплоя)</label>
                    <select id="env-template-id" class="form-control">
                        <option value="">— Не выбран —</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="env-description">Описание</label>
                    <textarea id="env-description" class="form-control" rows="3" placeholder="Описание окружения..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
                <button class="btn btn-primary" onclick="saveEnvironment()">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Deploy History Modal -->
    <div id="history-modal" class="modal-overlay" style="display:none;">
        <div class="modal" style="max-width:700px;">
            <div class="modal-header">
                <h3 id="history-modal-title">История деплоев</h3>
                <button class="modal-close" onclick="closeHistoryModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="history-content">
                    <div class="loading"><div class="loading-spinner"></div><p>Загрузка...</p></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeHistoryModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const projectId = parseInt(params.get('project_id') || '0');
        let allEnvironments = [];
        let currentTier = 'all';

        document.addEventListener('DOMContentLoaded', async () => {
            renderSidebar('deploy-environments');
            await loadEnvironments();
            await loadTemplatesForSelect();
        });

        async function loadEnvironments() {
            try {
                const url = projectId
                    ? `/api/projects/${projectId}/deploy-environments`
                    : '/api/deploy-environments';
                const envs = await apiGet(url);
                allEnvironments = envs || [];
                renderEnvironments();
            } catch (e) {
                document.getElementById('environments-content').innerHTML =
                    `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>Ошибка загрузки: ${escapeHtml(e.message)}</p></div>`;
            }
        }

        async function loadTemplatesForSelect() {
            if (!projectId) return;
            try {
                const templates = await apiGet(`/api/projects/${projectId}/templates`);
                const sel = document.getElementById('env-template-id');
                (templates || []).forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.id;
                    opt.textContent = t.name;
                    sel.appendChild(opt);
                });
            } catch (_) {}
        }

        function filterByTier(tier, btn) {
            currentTier = tier;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderEnvironments();
        }

        function renderEnvironments() {
            const filtered = currentTier === 'all'
                ? allEnvironments
                : allEnvironments.filter(e => e.tier === currentTier);

            const container = document.getElementById('environments-content');
            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-rocket"></i><p>Нет deployment environments</p></div>`;
                return;
            }

            container.innerHTML = `<div class="grid-cards">${filtered.map(renderEnvCard).join('')}</div>`;
        }

        function tierColor(tier) {
            const colors = {
                production: '#e53935',
                staging: '#fb8c00',
                dev: '#1e88e5',
                review: '#8e24aa',
                other: '#757575',
            };
            return colors[tier] || '#757575';
        }

        function statusIcon(status) {
            if (status === 'active') return '<i class="fa-solid fa-circle-check" style="color:#4caf50"></i>';
            if (status === 'stopped') return '<i class="fa-solid fa-circle-stop" style="color:#9e9e9e"></i>';
            return '<i class="fa-solid fa-circle-question" style="color:#ff9800"></i>';
        }

        function renderEnvCard(env) {
            const tierBadge = `<span style="background:${tierColor(env.tier)};color:#fff;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase;">${escapeHtml(env.tier || 'other')}</span>`;
            const version = env.last_deploy_version ? `<span style="font-family:monospace;font-size:12px;background:#f5f5f5;padding:2px 6px;border-radius:4px;">${escapeHtml(env.last_deploy_version)}</span>` : '<span style="color:var(--text-light);font-size:12px;">—</span>';
            const lastDeploy = env.last_deployed_at
                ? `<span title="${escapeHtml(env.last_deployed_at)}">${formatDate(env.last_deployed_at)}</span>`
                : '<span style="color:var(--text-light)">Ещё не деплоили</span>';

            return `
            <div class="card" style="padding:16px;position:relative;">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;">
                    <div>
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                            ${statusIcon(env.status)}
                            <strong style="font-size:15px;">${escapeHtml(env.name)}</strong>
                        </div>
                        ${tierBadge}
                    </div>
                    <div style="display:flex;gap:6px;flex-shrink:0;">
                        <button class="btn btn-sm btn-secondary" onclick='openHistory(${env.id}, "${escapeHtml(env.name)}")' title="История деплоев">
                            <i class="fa-solid fa-clock-rotate-left"></i>
                        </button>
                        ${env.template_id ? `<button class="btn btn-sm btn-primary" onclick="deployNow(${env.id})" title="Задеплоить сейчас">
                            <i class="fa-solid fa-rocket"></i>
                        </button>` : ''}
                        <button class="btn btn-sm btn-secondary" onclick='editEnvironment(${JSON.stringify(env).replace(/'/g, "&apos;")})'><i class="fa-solid fa-pen"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="deleteEnvironment(${env.id}, '${escapeHtml(env.name)}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>

                ${env.url ? `<div style="margin-bottom:8px;"><a href="${escapeHtml(env.url)}" target="_blank" style="color:var(--primary);font-size:13px;"><i class="fa-solid fa-link"></i> ${escapeHtml(env.url)}</a></div>` : ''}

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;color:var(--text-light);margin-top:8px;">
                    <div><i class="fa-solid fa-tag" style="width:16px;"></i> Версия: ${version}</div>
                    <div><i class="fa-solid fa-calendar" style="width:16px;"></i> Деплой: ${lastDeploy}</div>
                    ${env.last_deployed_by ? `<div><i class="fa-solid fa-user" style="width:16px;"></i> Кем: ${escapeHtml(env.last_deployed_by)}</div>` : ''}
                    ${env.last_task_id ? `<div><i class="fa-solid fa-list-check" style="width:16px;"></i> Задача: <a href="task.html?id=${env.last_task_id}&project_id=${projectId}" style="color:var(--primary);">#${env.last_task_id}</a></div>` : ''}
                </div>
            </div>`;
        }

        function openModal(env = null) {
            const modal = document.getElementById('env-modal');
            const title = document.getElementById('modal-title');
            if (env) {
                title.textContent = 'Редактировать Environment';
                document.getElementById('env-id').value = env.id;
                document.getElementById('env-name').value = env.name || '';
                document.getElementById('env-url').value = env.url || '';
                document.getElementById('env-tier').value = env.tier || 'production';
                document.getElementById('env-template-id').value = env.template_id || '';
                document.getElementById('env-description').value = env.description || '';
            } else {
                title.textContent = 'Создать Deployment Environment';
                document.getElementById('env-id').value = '';
                document.getElementById('env-name').value = '';
                document.getElementById('env-url').value = '';
                document.getElementById('env-tier').value = 'production';
                document.getElementById('env-template-id').value = '';
                document.getElementById('env-description').value = '';
            }
            modal.style.display = 'flex';
        }

        function editEnvironment(env) {
            openModal(env);
        }

        function closeModal() {
            document.getElementById('env-modal').style.display = 'none';
        }

        async function saveEnvironment() {
            const id = document.getElementById('env-id').value;
            const name = document.getElementById('env-name').value.trim();
            if (!name) { alert('Введите название'); return; }

            const payload = {
                name,
                url: document.getElementById('env-url').value.trim() || null,
                tier: document.getElementById('env-tier').value,
                template_id: document.getElementById('env-template-id').value
                    ? parseInt(document.getElementById('env-template-id').value) : null,
                description: document.getElementById('env-description').value.trim() || null,
                project_id: projectId || null,
            };

            try {
                if (id) {
                    await apiPut(`/api/deploy-environments/${id}`, payload);
                } else {
                    await apiPost('/api/deploy-environments', payload);
                }
                closeModal();
                await loadEnvironments();
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }

        async function deleteEnvironment(id, name) {
            if (!confirm(`Удалить environment "${name}"?`)) return;
            try {
                await apiDelete(`/api/deploy-environments/${id}`);
                await loadEnvironments();
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }

        async function deployNow(envId) {
            if (!confirm('Запустить деплой для этого окружения?')) return;
            try {
                // Trigger deploy via template linked to environment
                const env = allEnvironments.find(e => e.id === envId);
                if (!env || !env.template_id) {
                    alert('У окружения не настроен template для деплоя');
                    return;
                }
                const task = await apiPost(`/api/projects/${projectId}/tasks`, {
                    template_id: env.template_id,
                });
                alert(`Задача #${task.id} создана. Перейти на страницу задачи?`);
                if (confirm('Перейти к задаче?')) {
                    window.location.href = `task.html?id=${task.id}&project_id=${projectId}`;
                }
            } catch (e) {
                alert('Ошибка запуска деплоя: ' + e.message);
            }
        }

        async function openHistory(envId, envName) {
            document.getElementById('history-modal-title').textContent = `История деплоев — ${envName}`;
            document.getElementById('history-content').innerHTML =
                '<div class="loading"><div class="loading-spinner"></div><p>Загрузка...</p></div>';
            document.getElementById('history-modal').style.display = 'flex';

            try {
                const records = await apiGet(`/api/deploy-environments/${envId}/history`);
                renderHistory(records || []);
            } catch (e) {
                document.getElementById('history-content').innerHTML =
                    `<p style="color:red;">Ошибка: ${escapeHtml(e.message)}</p>`;
            }
        }

        function renderHistory(records) {
            const container = document.getElementById('history-content');
            if (records.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-clock-rotate-left"></i><p>История пуста</p></div>';
                return;
            }
            container.innerHTML = `
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Задача</th>
                        <th>Версия</th>
                        <th>Статус</th>
                        <th>Кем</th>
                        <th>Дата</th>
                    </tr>
                </thead>
                <tbody>
                    ${records.map(r => `
                    <tr>
                        <td>${r.id}</td>
                        <td>${r.task_id ? `<a href="task.html?id=${r.task_id}&project_id=${projectId}" style="color:var(--primary);">#${r.task_id}</a>` : '—'}</td>
                        <td><span style="font-family:monospace;font-size:12px;">${escapeHtml(r.version || '—')}</span></td>
                        <td><span class="badge ${r.status === 'success' ? 'badge-success' : r.status === 'failed' ? 'badge-danger' : 'badge-secondary'}">${escapeHtml(r.status || '—')}</span></td>
                        <td>${escapeHtml(r.deployed_by || '—')}</td>
                        <td>${formatDate(r.deployed_at)}</td>
                    </tr>`).join('')}
                </tbody>
            </table>`;
        }

        function closeHistoryModal() {
            document.getElementById('history-modal').style.display = 'none';
        }
    </script>
</body>
</html>
