<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes ConfigMaps — Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <style>
        .k8s-icon { color:#326ce5;font-size:22px; }
        .keys-count { font-size:12px;color:var(--text-light); }
        .key-chip { display:inline-block;background:#f3f4f6;border:1px solid var(--border);border-radius:5px;padding:1px 7px;font-family:monospace;font-size:11px;margin:1px; }
        .toolbar { display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px; }
        .tbl-icon-btn { background:none;border:none;cursor:pointer;color:var(--text-light);padding:4px 6px;border-radius:4px;font-size:14px; }
        .tbl-icon-btn:hover { color:var(--primary); }
        /* Editor modal */
        .editor-overlay { position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center; }
        .editor-dialog { background:var(--surface);border-radius:12px;width:760px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.2); }
        .editor-header { display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border); }
        .editor-body { flex:1;overflow-y:auto;padding:20px; }
        .editor-footer { padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px; }
        .kv-editor-row { display:grid;grid-template-columns:1fr 2fr auto;gap:8px;margin-bottom:8px;align-items:start; }
        .kv-editor-row input { font-family:monospace;font-size:13px; }
        .kv-editor-row textarea { font-family:monospace;font-size:12px;resize:vertical;min-height:56px; }
        .detail-overlay { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;display:flex;justify-content:flex-end; }
        .detail-panel { width:560px;max-width:96vw;background:var(--surface);height:100vh;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,.15);padding:24px;display:flex;flex-direction:column;gap:14px; }
        .detail-header { display:flex;align-items:center;justify-content:space-between; }
        .detail-title { font-size:16px;font-weight:600;word-break:break-all; }
        .section-title { font-size:12px;font-weight:600;text-transform:uppercase;color:var(--text-light);margin-bottom:8px;margin-top:4px; }
        .cm-value-block { background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;margin-bottom:8px; }
        .cm-key-label { font-size:11px;font-weight:600;color:#326ce5;margin-bottom:4px; }
    </style>
</head>
<body>
<div class="layout">
    <nav class="sidebar"></nav>
    <main class="main-content">
        <div class="page-header">
            <div style="display:flex;align-items:center;gap:10px">
                <i class="fa-solid fa-sliders k8s-icon"></i>
                <div><h1 class="page-title">ConfigMaps</h1><p class="page-subtitle">Kubernetes — конфигурационные данные</p></div>
            </div>
        </div>

        <div class="toolbar">
            <select class="form-control" id="clusterSelect" style="min-width:180px"><option value="">— Кластер —</option></select>
            <select class="form-control" id="namespaceSelect" style="min-width:180px" disabled><option value="">— Namespace —</option></select>
            <input type="text" class="form-control" id="filter" placeholder="Фильтр по имени…" style="flex:1;min-width:140px" disabled>
            <button class="btn btn-secondary" id="refreshBtn" disabled><i class="fa-solid fa-rotate-right"></i> Обновить</button>
        </div>

        <div id="stateNotConfigured" class="empty-state" style="display:none"><i class="fa-solid fa-dharmachakra" style="font-size:48px;color:#326ce5;opacity:.4;margin-bottom:12px"></i><p>Kubernetes не сконфигурирован.</p></div>
        <div id="stateSelectCluster" class="empty-state" style="display:none"><i class="fa-solid fa-circle-info" style="font-size:36px;color:#aaa;margin-bottom:10px"></i><p>Выберите кластер и namespace.</p></div>
        <div id="stateLoading" class="empty-state" style="display:none"><i class="fa-solid fa-circle-notch fa-spin" style="font-size:36px;color:#aaa;margin-bottom:10px"></i><p>Загрузка…</p></div>
        <div id="stateForbidden" class="empty-state" style="display:none"><i class="fa-solid fa-ban" style="font-size:36px;color:#c62828;opacity:.5;margin-bottom:10px"></i><p>Нет прав.</p></div>
        <div id="stateError" class="empty-state" style="display:none"><i class="fa-solid fa-triangle-exclamation" style="font-size:36px;color:#f57f17;opacity:.6;margin-bottom:10px"></i><p id="stateErrorMsg">Ошибка.</p></div>
        <div id="stateEmpty" class="empty-state" style="display:none"><i class="fa-solid fa-sliders" style="font-size:36px;color:#aaa;opacity:.5;margin-bottom:10px"></i><p>Нет ConfigMap'ов.</p></div>

        <div id="tableWrap" style="display:none">
            <div class="table-container">
                <table class="data-table">
                    <thead><tr><th>Имя</th><th>Ключи</th><th>Binary</th><th>Создан</th><th></th></tr></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Edit modal -->
<div id="editorOverlay" class="editor-overlay" style="display:none">
    <div class="editor-dialog">
        <div class="editor-header">
            <h3 style="font-size:15px;font-weight:600" id="editorTitle">Редактировать ConfigMap</h3>
            <button class="btn btn-secondary btn-sm" onclick="closeEditor()">✕</button>
        </div>
        <div class="editor-body">
            <p style="font-size:12px;color:var(--text-light);margin-bottom:12px">Ключ / Значение</p>
            <div id="kvRows"></div>
            <button class="btn btn-secondary btn-sm" style="margin-top:4px" onclick="addKvRow()"><i class="fa-solid fa-plus"></i> Добавить ключ</button>
        </div>
        <div class="editor-footer">
            <button class="btn btn-secondary" onclick="closeEditor()">Отмена</button>
            <button class="btn btn-primary" onclick="saveEditor()">Сохранить</button>
        </div>
    </div>
</div>

<!-- Detail panel -->
<div id="detailOverlay" class="detail-overlay" style="display:none" onclick="closeDetail(event)">
    <div class="detail-panel" onclick="event.stopPropagation()">
        <div class="detail-header"><span class="detail-title" id="detailName"></span><button class="btn btn-secondary btn-sm" onclick="closeDetail()">✕</button></div>
        <div id="detailContent"></div>
    </div>
</div>

<script src="app.js"></script>
<script>
let currentClusterId=null, currentNamespace=null, cache=[], editorTarget=null;
const enc=s=>encodeURIComponent(s);

document.addEventListener('DOMContentLoaded', async () => {
    await loadClusters();
    document.getElementById('clusterSelect').addEventListener('change', onClusterChange);
    document.getElementById('namespaceSelect').addEventListener('change', onNsChange);
    document.getElementById('filter').addEventListener('input', renderTable);
    document.getElementById('refreshBtn').addEventListener('click', load);
});

async function loadClusters() {
    try {
        const data=await api.get('/kubernetes/clusters');
        const sel=document.getElementById('clusterSelect');
        if (!data.clusters?.length){showState('notConfigured');return;}
        data.clusters.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.display_name||c.id;sel.appendChild(o);});
        showState('selectCluster');
    } catch {showState('notConfigured');}
}

async function onClusterChange() {
    currentClusterId=document.getElementById('clusterSelect').value||null;
    const nsSel=document.getElementById('namespaceSelect');
    nsSel.innerHTML='<option value="">— Namespace —</option>';nsSel.disabled=true;hide();
    if (!currentClusterId){showState('selectCluster');return;}
    showState('loading');
    try {
        const data=await api.get(`/kubernetes/clusters/${enc(currentClusterId)}/namespaces?limit=500`);
        (data.items||[]).forEach(ns=>{const o=document.createElement('option');o.value=ns.name;o.textContent=ns.name;nsSel.appendChild(o);});
        nsSel.disabled=false;showState('selectCluster');
    } catch(e){showState('error',e.message);}
}

async function onNsChange() {
    currentNamespace=document.getElementById('namespaceSelect').value||null;
    if (!currentNamespace){hide();showState('selectCluster');return;}
    await load();
}

async function load() {
    if (!currentClusterId||!currentNamespace) return;
    showState('loading');hide();
    try {
        const data=await api.get(`/kubernetes/clusters/${enc(currentClusterId)}/namespaces/${enc(currentNamespace)}/configmaps?limit=200`);
        cache=data.items||[];
        if (!cache.length){showState('empty');return;}
        renderTable();show();
        document.getElementById('filter').disabled=false;
        document.getElementById('refreshBtn').disabled=false;
    } catch(e){
        const m=e.message||'';
        if (m.includes('FORBIDDEN')||m.includes('403')) showState('forbidden');
        else showState('error',m);
    }
}

function renderTable() {
    const f=(document.getElementById('filter').value||'').toLowerCase();
    const rows=cache.filter(cm=>!f||cm.name.toLowerCase().includes(f));
    const tbody=document.getElementById('tbody');
    if (!rows.length){tbody.innerHTML=`<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-light)">Нет совпадений</td></tr>`;return;}
    tbody.innerHTML=rows.map(cm=>{
        const keys=Object.keys(cm.data||{});
        const keysHtml=keys.slice(0,4).map(k=>`<span class="key-chip">${escapeHtml(k)}</span>`).join('')+(keys.length>4?`<span class="keys-count"> +${keys.length-4}</span>`:'');
        const binHtml=(cm.binary_data_keys||[]).length?`<span class="keys-count">${cm.binary_data_keys.length} ключей</span>`:'—';
        return `<tr>
            <td><a href="#" onclick="showDetail(${JSON.stringify(cm.name)});return false" style="font-weight:500;font-size:13px">${escapeHtml(cm.name)}</a></td>
            <td>${keysHtml||'<span style="color:var(--text-light)">пусто</span>'}</td>
            <td>${binHtml}</td>
            <td>${cm.created_at?`<span style="font-size:11px;color:var(--text-light)">${formatDate(cm.created_at)}</span>`:'—'}</td>
            <td style="white-space:nowrap">
                <button class="tbl-icon-btn" title="Редактировать" onclick="openEditor(${JSON.stringify(cm.name)})"><i class="fa-solid fa-pen"></i></button>
                <button class="tbl-icon-btn" title="Удалить" onclick="confirmDelete(${JSON.stringify(cm.name)})"><i class="fa-solid fa-trash"></i></button>
            </td>
        </tr>`;
    }).join('');
}

async function showDetail(name) {
    document.getElementById('detailName').textContent=name;
    document.getElementById('detailContent').innerHTML='<p style="color:var(--text-light)">Загрузка…</p>';
    document.getElementById('detailOverlay').style.display='flex';
    try {
        const cm=await api.get(`/kubernetes/clusters/${enc(currentClusterId)}/namespaces/${enc(currentNamespace)}/configmaps/${enc(name)}`);
        const entries=Object.entries(cm.data||{});
        const dataHtml=entries.length?entries.map(([k,v])=>`
            <div class="cm-key-label">${escapeHtml(k)}</div>
            <div class="cm-value-block">${escapeHtml(v)}</div>`).join('')
            :'<span style="color:var(--text-light)">Нет данных</span>';
        const binHtml=(cm.binary_data_keys||[]).length
            ?cm.binary_data_keys.map(k=>`<span class="key-chip">${escapeHtml(k)}</span>`).join('')
            :'—';
        const labelsHtml=Object.entries(cm.labels||{}).map(([k,v])=>`<span class="key-chip" style="background:#e8f0fe;color:#1a56db">${escapeHtml(k)}=${escapeHtml(v)}</span>`).join('')||'—';
        document.getElementById('detailContent').innerHTML=`
            <div class="section-title">Data (${entries.length} ключей)</div>
            ${dataHtml}
            ${(cm.binary_data_keys||[]).length?`<div class="section-title" style="margin-top:8px">Binary Data</div><div>${binHtml}</div>`:''}
            <div class="section-title" style="margin-top:12px">Labels</div><div>${labelsHtml}</div>
            <div style="margin-top:16px;display:flex;gap:8px">
                <button class="btn btn-secondary btn-sm" onclick="openEditor(${JSON.stringify(cm.name)})"><i class="fa-solid fa-pen"></i> Редактировать</button>
                <button class="btn btn-danger btn-sm" onclick="confirmDelete(${JSON.stringify(cm.name)})"><i class="fa-solid fa-trash"></i> Удалить</button>
            </div>`;
    } catch(e){document.getElementById('detailContent').innerHTML=`<p style="color:#c62828">Ошибка: ${escapeHtml(e.message||'')}</p>`;}
}

function closeDetail(e){if(!e||e.target===document.getElementById('detailOverlay'))document.getElementById('detailOverlay').style.display='none';}

// ── Editor ────────────────────────────────────────────────────────────────────
async function openEditor(name) {
    editorTarget=name;
    document.getElementById('editorTitle').textContent=`Редактировать: ${name}`;
    document.getElementById('kvRows').innerHTML='<p style="color:var(--text-light);font-size:12px">Загрузка…</p>';
    document.getElementById('editorOverlay').style.display='flex';
    try {
        const cm=await api.get(`/kubernetes/clusters/${enc(currentClusterId)}/namespaces/${enc(currentNamespace)}/configmaps/${enc(name)}`);
        document.getElementById('kvRows').innerHTML='';
        Object.entries(cm.data||{}).forEach(([k,v])=>addKvRow(k,v));
        if (!Object.keys(cm.data||{}).length) addKvRow();
    } catch(e){document.getElementById('kvRows').innerHTML=`<p style="color:#c62828">Ошибка: ${escapeHtml(e.message||'')}</p>`;}
}

function addKvRow(key='', val='') {
    const row=document.createElement('div');
    row.className='kv-editor-row';
    row.innerHTML=`
        <input type="text" class="form-control kv-key" placeholder="key" value="${escapeHtml(key)}">
        <textarea class="form-control kv-val" placeholder="value">${escapeHtml(val)}</textarea>
        <button class="btn btn-secondary btn-sm" onclick="this.closest('.kv-editor-row').remove()" title="Удалить строку"><i class="fa-solid fa-xmark"></i></button>`;
    document.getElementById('kvRows').appendChild(row);
}

async function saveEditor() {
    const rows=[...document.querySelectorAll('#kvRows .kv-editor-row')];
    const data={};
    for (const row of rows) {
        const k=row.querySelector('.kv-key').value.trim();
        const v=row.querySelector('.kv-val').value;
        if (k) data[k]=v;
    }
    try {
        await api.put(`/kubernetes/clusters/${enc(currentClusterId)}/namespaces/${enc(currentNamespace)}/configmaps/${enc(editorTarget)}`, {data});
        closeEditor();
        await load();
    } catch(e){alert(`Ошибка сохранения: ${e.message||e}`);}
}

function closeEditor(){document.getElementById('editorOverlay').style.display='none';editorTarget=null;}

function confirmDelete(name){
    if(!confirm(`Удалить ConfigMap "${name}"?`))return;
    api.delete(`/kubernetes/clusters/${enc(currentClusterId)}/namespaces/${enc(currentNamespace)}/configmaps/${enc(name)}`)
        .then(()=>{cache=cache.filter(c=>c.name!==name);renderTable();document.getElementById('detailOverlay').style.display='none';if(!cache.length){hide();showState('empty');}})
        .catch(e=>alert(`Ошибка: ${e.message||e}`));
}

function showState(s,msg){['notConfigured','selectCluster','loading','forbidden','error','empty'].forEach(x=>{document.getElementById('state'+x.charAt(0).toUpperCase()+x.slice(1)).style.display='none';});const el=document.getElementById('state'+s.charAt(0).toUpperCase()+s.slice(1));if(el)el.style.display='';if(s==='error'&&msg)document.getElementById('stateErrorMsg').textContent=msg;}
function show(){document.getElementById('tableWrap').style.display='';}
function hide(){document.getElementById('tableWrap').style.display='none';}
</script>
</body>
</html>
