<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Ingress — Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <style>
        .k8s-icon { color:#326ce5;font-size:22px; }
        .tls-badge { display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;background:#e8f5e9;color:#2e7d32;font-size:11px;font-weight:600; }
        .class-badge { display:inline-block;background:#e8f0fe;color:#1a56db;border-radius:10px;padding:1px 8px;font-size:11px; }
        .rule-block { border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px; }
        .rule-host { font-weight:600;font-size:13px;margin-bottom:8px;color:var(--text); }
        .path-row { display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0;border-top:1px solid var(--border); }
        .path-row:first-of-type { border-top:none; }
        .path-code { font-family:monospace;background:var(--bg);padding:1px 6px;border-radius:4px; }
        .path-svc { color:#1a56db;font-family:monospace;font-size:11px; }
        .lb-chip { display:inline-block;background:#e8f0fe;border-radius:8px;padding:2px 8px;font-family:monospace;font-size:11px;margin:2px; }
        .toolbar { display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px; }
        .tbl-icon-btn { background:none;border:none;cursor:pointer;color:var(--text-light);padding:4px 6px;border-radius:4px;font-size:14px; }
        .tbl-icon-btn:hover { color:var(--primary); }
        .detail-overlay { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;display:flex;justify-content:flex-end; }
        .detail-panel { width:560px;max-width:96vw;background:var(--surface);height:100vh;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,.15);padding:24px;display:flex;flex-direction:column;gap:14px; }
        .detail-header { display:flex;align-items:center;justify-content:space-between; }
        .detail-title { font-size:16px;font-weight:600;word-break:break-all; }
        .section-title { font-size:12px;font-weight:600;text-transform:uppercase;color:var(--text-light);margin-bottom:8px;margin-top:4px; }
        .anno-row { display:flex;gap:8px;font-size:11px;font-family:monospace;padding:2px 0; }
        .anno-key { color:var(--text-light);flex-shrink:0;max-width:50%;overflow:hidden;text-overflow:ellipsis; }
        .anno-val { color:var(--text);word-break:break-all; }
    </style>
</head>
<body>
<div class="layout">
    <nav class="sidebar"></nav>
    <main class="main-content">
        <div class="page-header">
            <div style="display:flex;align-items:center;gap:10px">
                <i class="fa-solid fa-route k8s-icon"></i>
                <div><h1 class="page-title">Ingress</h1><p class="page-subtitle">Kubernetes — HTTP/HTTPS маршрутизация</p></div>
            </div>
        </div>

        <div class="toolbar">
            <select class="form-control" id="clusterSelect" style="min-width:180px"><option value="">— Кластер —</option></select>
            <select class="form-control" id="namespaceSelect" style="min-width:180px" disabled><option value="">— Namespace —</option></select>
            <input type="text" class="form-control" id="filter" placeholder="Фильтр по имени/хосту…" style="flex:1;min-width:140px" disabled>
            <button class="btn btn-secondary" id="refreshBtn" disabled><i class="fa-solid fa-rotate-right"></i> Обновить</button>
        </div>

        <div id="stateNotConfigured" class="empty-state" style="display:none"><i class="fa-solid fa-dharmachakra" style="font-size:48px;color:#326ce5;opacity:.4;margin-bottom:12px"></i><p>Kubernetes не сконфигурирован.</p></div>
        <div id="stateSelectCluster" class="empty-state" style="display:none"><i class="fa-solid fa-circle-info" style="font-size:36px;color:#aaa;margin-bottom:10px"></i><p>Выберите кластер и namespace.</p></div>
        <div id="stateLoading" class="empty-state" style="display:none"><i class="fa-solid fa-circle-notch fa-spin" style="font-size:36px;color:#aaa;margin-bottom:10px"></i><p>Загрузка…</p></div>
        <div id="stateForbidden" class="empty-state" style="display:none"><i class="fa-solid fa-ban" style="font-size:36px;color:#c62828;opacity:.5;margin-bottom:10px"></i><p>Нет прав.</p></div>
        <div id="stateError" class="empty-state" style="display:none"><i class="fa-solid fa-triangle-exclamation" style="font-size:36px;color:#f57f17;opacity:.6;margin-bottom:10px"></i><p id="stateErrorMsg">Ошибка.</p></div>
        <div id="stateEmpty" class="empty-state" style="display:none"><i class="fa-solid fa-route" style="font-size:36px;color:#aaa;opacity:.5;margin-bottom:10px"></i><p>Нет Ingress-ресурсов.</p></div>

        <div id="tableWrap" style="display:none">
            <div class="table-container">
                <table class="data-table">
                    <thead><tr><th>Имя</th><th>Class</th><th>Hosts</th><th>LB / IP</th><th>TLS</th><th>Создан</th><th></th></tr></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="detailOverlay" class="detail-overlay" style="display:none" onclick="closeDetail(event)">
    <div class="detail-panel" onclick="event.stopPropagation()">
        <div class="detail-header"><span class="detail-title" id="detailName"></span><button class="btn btn-secondary btn-sm" onclick="closeDetail()">✕</button></div>
        <div id="detailContent"></div>
    </div>
</div>

<script src="app.js"></script>
<script>
let currentClusterId=null, currentNamespace=null, cache=[];
const enc=s=>encodeURIComponent(s);

document.addEventListener('DOMContentLoaded', async () => {
    await loadClusters();
    document.getElementById('clusterSelect').addEventListener('change', onClusterChange);
    document.getElementById('namespaceSelect').addEventListener('change', onNsChange);
    document.getElementById('filter').addEventListener('input', renderTable);
    document.getElementById('refreshBtn').addEventListener('click', load);
});

async function loadClusters() {
    try {
        const data=await api.get('/kubernetes/clusters');
        const sel=document.getElementById('clusterSelect');
        if (!data.clusters?.length) { showState('notConfigured'); return; }
        data.clusters.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.display_name||c.id;sel.appendChild(o);});
        showState('selectCluster');
    } catch { showState('notConfigured'); }
}

async function onClusterChange() {
    currentClusterId=document.getElementById('clusterSelect').value||null;
    const nsSel=document.getElementById('namespaceSelect');
    nsSel.innerHTML='<option value="">— Namespace —</option>';nsSel.disabled=true;hide();
    if (!currentClusterId){showState('selectCluster');return;}
    showState('loading');
    try {
        const data=await api.get(`/kubernetes/clusters/${enc(currentClusterId)}/namespaces?limit=500`);
        (data.items||[]).forEach(ns=>{const o=document.createElement('option');o.value=ns.name;o.textContent=ns.name;nsSel.appendChild(o);});
        nsSel.disabled=false;showState('selectCluster');
    } catch(e){showState('error',e.message);}
}

async function onNsChange() {
    currentNamespace=document.getElementById('namespaceSelect').value||null;
    if (!currentNamespace){hide();showState('selectCluster');return;}
    await load();
}

async function load() {
    if (!currentClusterId||!currentNamespace) return;
    showState('loading');hide();
    try {
        const data=await api.get(`/kubernetes/clusters/${enc(currentClusterId)}/namespaces/${enc(currentNamespace)}/ingresses?limit=200`);
        cache=data.items||[];
        if (!cache.length){showState('empty');return;}
        renderTable();show();
        document.getElementById('filter').disabled=false;
        document.getElementById('refreshBtn').disabled=false;
    } catch(e) {
        const m=e.message||'';
        if (m.includes('FORBIDDEN')||m.includes('403')) showState('forbidden');
        else showState('error',m);
    }
}

function renderTable() {
    const f=(document.getElementById('filter').value||'').toLowerCase();
    const rows=cache.filter(ing=>!f||ing.name.toLowerCase().includes(f)||hostsOf(ing).toLowerCase().includes(f));
    const tbody=document.getElementById('tbody');
    if (!rows.length){tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-light)">Нет совпадений</td></tr>`;return;}
    tbody.innerHTML=rows.map(ing=>{
        const hosts=hostsOf(ing)||'*';
        const lbHtml=(ing.load_balancer_ips||[]).map(ip=>`<span class="lb-chip">${escapeHtml(ip)}</span>`).join('')||'—';
        const tlsHtml=ing.tls?.length?`<span class="tls-badge"><i class="fa-solid fa-lock"></i> TLS</span>`:'—';
        const classHtml=ing.ingress_class?`<span class="class-badge">${escapeHtml(ing.ingress_class)}</span>`:'—';
        return `<tr>
            <td><a href="#" onclick="showDetail(${JSON.stringify(ing.name)});return false" style="font-weight:500;font-size:13px">${escapeHtml(ing.name)}</a></td>
            <td>${classHtml}</td>
            <td style="font-size:12px;font-family:monospace">${escapeHtml(hosts)}</td>
            <td>${lbHtml}</td>
            <td>${tlsHtml}</td>
            <td>${ing.created_at?`<span style="font-size:11px;color:var(--text-light)">${formatDate(ing.created_at)}</span>`:'—'}</td>
            <td><button class="tbl-icon-btn" title="Удалить" onclick="confirmDelete(${JSON.stringify(ing.name)})"><i class="fa-solid fa-trash"></i></button></td>
        </tr>`;
    }).join('');
}

function hostsOf(ing) {
    return (ing.rules||[]).map(r=>r.host||'*').filter((h,i,a)=>a.indexOf(h)===i).join(', ');
}

async function showDetail(name) {
    document.getElementById('detailName').textContent=name;
    document.getElementById('detailContent').innerHTML='<p style="color:var(--text-light)">Загрузка…</p>';
    document.getElementById('detailOverlay').style.display='flex';
    try {
        const ing=await api.get(`/kubernetes/clusters/${enc(currentClusterId)}/namespaces/${enc(currentNamespace)}/ingresses/${enc(name)}`);
        const rulesHtml=(ing.rules||[]).map(r=>`
            <div class="rule-block">
                <div class="rule-host"><i class="fa-solid fa-globe" style="color:#326ce5;margin-right:6px"></i>${escapeHtml(r.host||'*')}</div>
                ${(r.paths||[]).map(p=>`
                    <div class="path-row">
                        <span class="path-code">${escapeHtml(p.path)}</span>
                        <span style="color:var(--text-light);font-size:10px">${escapeHtml(p.path_type)}</span>
                        <span>→</span>
                        <span class="path-svc">${escapeHtml(p.backend_service)}:${escapeHtml(p.backend_port)}</span>
                    </div>`).join('')}
            </div>`).join('')||'<span style="color:var(--text-light)">Нет правил</span>';
        const tlsHtml=(ing.tls||[]).map(t=>`
            <div style="background:var(--bg);border-radius:6px;padding:8px 12px;margin-bottom:6px;font-size:12px">
                <i class="fa-solid fa-lock" style="color:#2e7d32;margin-right:6px"></i>
                <strong>${(t.hosts||[]).join(', ')||'*'}</strong>
                ${t.secret_name?`<span style="color:var(--text-light);margin-left:8px">secret: <code>${escapeHtml(t.secret_name)}</code></span>`:''}
            </div>`).join('')||'<span style="color:var(--text-light)">Без TLS</span>';
        const annoEntries=Object.entries(ing.annotations||{});
        const annoHtml=annoEntries.length?annoEntries.map(([k,v])=>`<div class="anno-row"><span class="anno-key" title="${escapeHtml(k)}">${escapeHtml(k)}</span><span class="anno-val">${escapeHtml(v)}</span></div>`).join(''):'<span style="color:var(--text-light)">—</span>';
        const lbHtml=(ing.load_balancer_ips||[]).map(ip=>`<span class="lb-chip">${escapeHtml(ip)}</span>`).join('')||'—';
        document.getElementById('detailContent').innerHTML=`
            <div><span style="color:var(--text-light);font-size:13px">Class:</span> ${ing.ingress_class?`<span class="class-badge">${escapeHtml(ing.ingress_class)}</span>`:'<em style="color:var(--text-light)">default</em>'}&nbsp;&nbsp;<span style="color:var(--text-light);font-size:13px">LB:</span> ${lbHtml}</div>
            <div class="section-title">Правила маршрутизации</div>${rulesHtml}
            <div class="section-title" style="margin-top:8px">TLS</div>${tlsHtml}
            <div class="section-title" style="margin-top:8px">Annotations</div>${annoHtml}
            <div style="margin-top:16px"><button class="btn btn-danger btn-sm" onclick="confirmDelete(${JSON.stringify(ing.name)})"><i class="fa-solid fa-trash"></i> Удалить</button></div>`;
    } catch(e){document.getElementById('detailContent').innerHTML=`<p style="color:#c62828">Ошибка: ${escapeHtml(e.message||'')}</p>`;}
}

function closeDetail(e){if(!e||e.target===document.getElementById('detailOverlay'))document.getElementById('detailOverlay').style.display='none';}

function confirmDelete(name){
    if(!confirm(`Удалить Ingress "${name}"?`))return;
    api.delete(`/kubernetes/clusters/${enc(currentClusterId)}/namespaces/${enc(currentNamespace)}/ingresses/${enc(name)}`)
        .then(()=>{cache=cache.filter(i=>i.name!==name);renderTable();document.getElementById('detailOverlay').style.display='none';if(!cache.length){hide();showState('empty');}})
        .catch(e=>alert(`Ошибка: ${e.message||e}`));
}

function showState(s,msg){['notConfigured','selectCluster','loading','forbidden','error','empty'].forEach(x=>{document.getElementById('state'+x.charAt(0).toUpperCase()+x.slice(1)).style.display='none';});const el=document.getElementById('state'+s.charAt(0).toUpperCase()+s.slice(1));if(el)el.style.display='';if(s==='error'&&msg)document.getElementById('stateErrorMsg').textContent=msg;}
function show(){document.getElementById('tableWrap').style.display='';}
function hide(){document.getElementById('tableWrap').style.display='none';}
</script>
</body>
</html>
